<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Shopping Cart</title></head>
<body>
<div layout:fragment="content">
    <h4 class="pp-section-title mb-3"><i class="bi bi-cart3 me-2"></i>Shopping Cart</h4>

    <div th:if="${!cartItems.isEmpty()}">
        <div class="table-responsive">
            <table class="table table-hover align-middle" id="cartTable">
                <thead class="table-light">
                    <tr>
                        <th>Product</th>
                        <th class="text-end">Price</th>
                        <th class="text-center" style="width:130px;">Quantity</th>
                        <th class="text-end">Subtotal</th>
                        <th class="text-center" style="width:80px;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ci : ${cartItems}" th:data-product-id="${ci.product.id}">
                        <td th:text="${ci.product.name}"></td>
                        <td class="text-end" th:text="'₹' + ${#numbers.formatDecimal(ci.product.price, 1, 2)}"></td>
                        <td class="text-center">
                            <div class="input-group input-group-sm justify-content-center">
                                <button class="btn btn-outline-secondary" onclick="changeQty(this, -1)">−</button>
                                <input type="number" class="form-control text-center qty-input" style="max-width:60px;"
                                       th:value="${ci.quantity}" min="1" onchange="updateQty(this)"/>
                                <button class="btn btn-outline-secondary" onclick="changeQty(this, 1)">+</button>
                            </div>
                        </td>
                        <td class="text-end fw-bold subtotal" th:text="'₹' + ${#numbers.formatDecimal(ci.subtotal, 1, 2)}"></td>
                        <td class="text-center">
                            <button class="btn btn-outline-danger btn-sm" onclick="removeItem(this)">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3">
            <h5 class="mb-0">Total: <strong id="cartTotal" th:text="'₹' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></strong></h5>
            <div>
                <button class="btn btn-outline-secondary me-2" onclick="clearCart()">
                    <i class="bi bi-trash me-1"></i>Clear Cart
                </button>
                <a th:href="@{/checkout}" class="btn pp-btn-primary">
                    <i class="bi bi-credit-card me-1"></i>Proceed to Checkout
                </a>
            </div>
        </div>
    </div>

    <div th:if="${cartItems.isEmpty()}" class="text-center text-muted py-5">
        <i class="bi bi-cart-x display-4"></i>
        <p class="mt-2">Your cart is empty.</p>
        <a th:href="@{/products}" class="btn pp-btn-primary mt-2">Browse Products</a>
    </div>
</div>

<th:block layout:fragment="scripts">
<script>
function getProductId(el) {
    return el.closest('tr').dataset.productId;
}
function changeQty(btn, delta) {
    const input = btn.parentElement.querySelector('.qty-input');
    let val = parseInt(input.value) + delta;
    if (val < 1) val = 1;
    input.value = val;
    updateQty(input);
}
function updateQty(input) {
    const productId = getProductId(input);
    const qty = parseInt(input.value);
    if (qty < 1) { input.value = 1; return; }
    postJson('/api/cart/update', { productId, quantity: qty }).then(data => {
        if (data.success) {
            updateCartBadge(data.cartCount);
            location.reload();
        }
    });
}
function removeItem(btn) {
    const productId = getProductId(btn);
    postJson('/api/cart/remove', { productId }).then(data => {
        if (data.success) {
            updateCartBadge(data.cartCount);
            location.reload();
        }
    });
}
function clearCart() {
    if (!confirm('Remove all items from your cart?')) return;
    postJson('/api/cart/clear', {}).then(data => {
        if (data.success) {
            updateCartBadge(0);
            location.reload();
        }
    });
}
</script>
</th:block>
</body>
</html>
