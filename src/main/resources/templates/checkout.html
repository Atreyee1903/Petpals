<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Checkout</title></head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h4 class="pp-section-title mb-3"><i class="bi bi-credit-card me-2"></i>Checkout</h4>

            <!-- Order Summary -->
            <div class="card mb-3">
                <div class="card-header pp-card-header">Order Summary</div>
                <div class="card-body p-0">
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                            <tr><th>Product</th><th class="text-center">Qty</th><th class="text-end">Subtotal</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="ci : ${cartItems}">
                                <td th:text="${ci.product.name}"></td>
                                <td class="text-center" th:text="${ci.quantity}"></td>
                                <td class="text-end" th:text="'₹' + ${#numbers.formatDecimal(ci.subtotal, 1, 2)}"></td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr class="fw-bold">
                                <td colspan="2">Total</td>
                                <td class="text-end" th:text="'₹' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>

            <!-- Checkout Form -->
            <form th:action="@{/checkout}" method="post" th:object="${checkoutRequest}">
                <div class="card mb-3">
                    <div class="card-header pp-card-header">Shipping Address</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Street Address *</label>
                            <input type="text" th:field="*{street}" class="form-control"
                                   th:classappend="${#fields.hasErrors('street')} ? 'is-invalid'" required/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('street')}" th:errors="*{street}"></div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">City *</label>
                                <input type="text" th:field="*{city}" class="form-control" required/>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">State *</label>
                                <input type="text" th:field="*{state}" class="form-control" required/>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Postal Code *</label>
                                <input type="text" th:field="*{postalCode}" class="form-control" required/>
                            </div>
                        </div>
                        <div class="mb-0">
                            <label class="form-label">Phone Number *</label>
                            <input type="text" th:field="*{phone}" class="form-control" required/>
                        </div>
                    </div>
                </div>

                <div class="card mb-3">
                    <div class="card-header pp-card-header">Payment Details</div>
                    <div class="card-body">
                        <div class="mb-0">
                            <label class="form-label">UPI ID *</label>
                            <input type="text" th:field="*{upiId}" class="form-control" placeholder="yourname@bank" required/>
                            <div class="form-text">e.g., yourname@bank</div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/cart}" class="btn btn-secondary"><i class="bi bi-arrow-left me-1"></i>Back to Cart</a>
                    <button type="submit" class="btn pp-btn-primary btn-lg">
                        <i class="bi bi-check-circle me-1"></i>Pay ₹<span th:text="${#numbers.formatDecimal(cartTotal, 1, 2)}"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
