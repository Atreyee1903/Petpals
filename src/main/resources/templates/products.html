<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Products</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="pp-section-title mb-0"><i class="bi bi-shop me-2"></i>Pet Supplies &amp; Goodies</h4>
        <form th:action="@{/products}" method="get" class="d-flex" style="width:320px;">
            <input type="text" name="search" class="form-control form-control-sm me-2"
                   placeholder="Search products…" th:value="${searchTerm}"/>
            <button class="btn pp-btn-primary btn-sm" type="submit"><i class="bi bi-search"></i></button>
        </form>
    </div>

    <div class="row g-3" th:if="${!products.isEmpty()}">
        <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6" th:each="p : ${products}">
            <div class="card pp-card h-100 text-center">
                <div class="card-body pb-1">
                    <h6 class="card-title fw-bold small" th:text="${p.name}" th:title="${p.name}"></h6>
                    <p class="pp-price fw-bold mb-2" th:text="'₹' + ${#numbers.formatDecimal(p.price, 1, 2)}"></p>
                </div>
                <img th:src="@{'/images/products/' + ${p.image}}" class="px-3" style="height:120px;object-fit:contain;"
                     th:alt="${p.name}" onerror="this.src='/images/products/default_placeholder.png'"/>
                <div class="card-footer bg-transparent border-0 pt-2 pb-3">
                    <button class="btn pp-btn-primary btn-sm w-100"
                            th:data-product-id="${p.id}" onclick="addToCart(this)">
                        <i class="bi bi-cart-plus me-1"></i>Add to Cart
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${products.isEmpty()}" class="text-center text-muted py-5">
        <i class="bi bi-search display-4"></i>
        <p class="mt-2" th:if="${searchTerm != null && !searchTerm.isEmpty()}"
           th:text="'No products found matching &quot;' + ${searchTerm} + '&quot;.'"></p>
        <p class="mt-2" th:unless="${searchTerm != null && !searchTerm.isEmpty()}">No products available right now.</p>
    </div>
</div>

<th:block layout:fragment="scripts">
<script>
function addToCart(btn) {
    const productId = btn.dataset.productId;
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-check-lg me-1"></i>Added!';
    postJson('/api/cart/add', { productId: productId, quantity: 1 }).then(data => {
        if (data.success) updateCartBadge(data.cartCount);
        setTimeout(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-cart-plus me-1"></i>Add to Cart';
        }, 1000);
    });
}
</script>
</th:block>
</body>
</html>
