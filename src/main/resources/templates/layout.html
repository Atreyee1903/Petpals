<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title layout:title-pattern="$CONTENT_TITLE - PetPals">PetPals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark pp-navbar sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/home}">
            <img th:src="@{/images/app/app_icon.png}" alt="PetPals" width="32" height="32" class="me-2"/>
            <span class="fw-bold">PetPals</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto" sec:authorize="isAuthenticated()">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}"><i class="bi bi-house-door me-1"></i>Home</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}"><i class="bi bi-shop me-1"></i>Products</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/favorites}"><i class="bi bi-heart me-1"></i>Favorites</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/orders}"><i class="bi bi-bag-check me-1"></i>Orders</a></li>
                <li class="nav-item" sec:authorize="!hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/support}"><i class="bi bi-headset me-1"></i>Support</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link dropdown-toggle pp-admin-link" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-gear me-1"></i>Admin
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/admin}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/pets}"><i class="bi bi-heart-pulse me-1"></i>Pets</a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/products}"><i class="bi bi-box-seam me-1"></i>Products</a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/orders}"><i class="bi bi-receipt me-1"></i>Orders</a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/testimonials}"><i class="bi bi-chat-quote me-1"></i>Testimonials</a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/support}"><i class="bi bi-headset me-1"></i>Support</a></li>
                    </ul>
                </li>
            </ul>
            <div class="d-flex align-items-center" sec:authorize="isAuthenticated()">
                <span class="text-light me-3 small" sec:authentication="name"
                      th:text="'Hi, ' + ${#authentication.name} + '!'"></span>
                <a th:href="@{/cart}" class="btn btn-outline-light btn-sm me-2 position-relative" id="cartBtn">
                    <i class="bi bi-cart3"></i> Cart
                    <span class="badge rounded-pill bg-warning text-dark ms-1" id="cartBadge"
                          th:text="${cartCount}" th:classappend="${cartCount > 0} ? '' : 'd-none'"></span>
                </a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- Flash Messages -->
<div class="container-fluid px-4 mt-2">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- Main Content -->
<main class="container-fluid px-4 py-3">
    <div layout:fragment="content"></div>
</main>

<footer class="text-center py-3 mt-4 border-top small text-muted">
    &copy; 2026 PetPals &mdash; Find your furry best friend!
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

    function postJson(url, body) {
        return fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded', [csrfHeader]: csrfToken },
            body: new URLSearchParams(body)
        }).then(r => r.json());
    }

    function updateCartBadge(count) {
        const badge = document.getElementById('cartBadge');
        if (badge) {
            badge.textContent = count;
            badge.classList.toggle('d-none', count <= 0);
        }
    }
</script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
