<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login - PetPals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="pp-auth-body d-flex align-items-center justify-content-center min-vh-100">
<div class="card pp-auth-card shadow">
    <div class="card-body text-center p-4">
        <img th:src="@{/images/app/app_icon.png}" alt="PetPals" width="64" height="64" class="mb-3"/>
        <h3 class="pp-primary-text mb-4">Welcome to PetPals!</h3>

        <div th:if="${param.error}" class="alert alert-danger py-2">
            <i class="bi bi-exclamation-triangle me-1"></i>Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-info py-2">
            <i class="bi bi-check-circle me-1"></i>You have been logged out.
        </div>
        <div th:if="${successMessage}" class="alert alert-success py-2">
            <i class="bi bi-check-circle me-1"></i><span th:text="${successMessage}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3 text-start">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required autofocus/>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required/>
            </div>
            <div class="mb-3 form-check text-start">
                <input type="checkbox" name="remember-me" class="form-check-input" id="rememberMe"/>
                <label class="form-check-label" for="rememberMe">Remember me</label>
            </div>
            <button type="submit" class="btn pp-btn-primary w-100 mb-2">Login</button>
        </form>
        <p class="mt-3 mb-0">Don't have an account?
            <a th:href="@{/signup}" class="pp-link">Sign Up</a>
        </p>
    </div>
</div>
</body>
</html>
