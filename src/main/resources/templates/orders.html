<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Order History</title></head>
<body>
<div layout:fragment="content">
    <h4 class="pp-section-title mb-3"><i class="bi bi-bag-check me-2"></i>Your Order History</h4>

    <div th:if="${!orders.isEmpty()}" class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>Order ID</th>
                    <th>Date</th>
                    <th class="text-end">Total Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="o : ${orders}">
                    <td th:text="${o.id}"></td>
                    <td th:text="${#temporals.format(o.orderDate, 'yyyy-MM-dd HH:mm')}"></td>
                    <td class="text-end fw-bold" th:text="'₹' + ${#numbers.formatDecimal(o.totalAmount, 1, 2)}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${o.status == 'Pending'} ? 'bg-warning text-dark' :
                                             (${o.status == 'Shipped'} ? 'bg-info' :
                                             (${o.status == 'Delivered'} ? 'bg-success' :
                                             (${o.status == 'Cancelled'} ? 'bg-danger' : 'bg-secondary')))"
                              th:text="${o.status}"></span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${orders.isEmpty()}" class="text-center text-muted py-5">
        <i class="bi bi-bag-x display-4"></i>
        <p class="mt-2">No orders found.</p>
        <a th:href="@{/products}" class="btn pp-btn-primary mt-2">Start Shopping</a>
    </div>
</div>
</body>
</html>
