<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Sign Up - PetPals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="pp-auth-body d-flex align-items-center justify-content-center min-vh-100">
<div class="card pp-auth-card shadow" style="max-width:460px;">
    <div class="card-body p-4">
        <div class="text-center mb-3">
            <img th:src="@{/images/app/app_icon.png}" alt="PetPals" width="48" height="48" class="mb-2"/>
            <h4 class="pp-primary-text">Create Account</h4>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger py-2">
            <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/signup}" method="post" th:object="${signupRequest}">
            <div class="mb-3">
                <label class="form-label">Username *</label>
                <input type="text" th:field="*{username}" class="form-control"
                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'" required/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password *</label>
                <input type="password" th:field="*{password}" class="form-control"
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" required/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password *</label>
                <input type="password" th:field="*{confirmPassword}" class="form-control" required/>
            </div>
            <div class="mb-3">
                <label class="form-label">Email *</label>
                <input type="email" th:field="*{email}" class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" required/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" th:field="*{fullName}" class="form-control"/>
            </div>
            <button type="submit" class="btn pp-btn-primary w-100 mb-2">Sign Up</button>
        </form>
        <p class="text-center mt-2 mb-0">Already have an account?
            <a th:href="@{/login}" class="pp-link">Login</a>
        </p>
    </div>
</div>
</body>
</html>
