<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Manage Products</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="pp-section-title mb-0"><i class="bi bi-box-seam me-2"></i>Product Management</h4>
        <button class="btn pp-btn-primary" data-bs-toggle="modal" data-bs-target="#productModal" onclick="openProductForm()">
            <i class="bi bi-plus-lg me-1"></i>Add Product
        </button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr><th>ID</th><th>Name</th><th>Category</th><th class="text-end">Price</th><th>Image</th><th>Actions</th></tr>
            </thead>
            <tbody>
                <tr th:each="p : ${products}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.category}"></td>
                    <td class="text-end" th:text="'₹' + ${#numbers.formatDecimal(p.price, 1, 2)}"></td>
                    <td><img th:src="@{'/images/products/' + ${p.image}}" width="50" height="50" style="object-fit:contain;"
                             onerror="this.src='/images/products/default_placeholder.png'"/></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="openProductForm(this)"
                                th:data-id="${p.id}" th:data-name="${p.name}" th:data-category="${p.category}"
                                th:data-price="${p.price}" th:data-image="${p.image}">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <form th:action="@{'/admin/products/delete/' + ${p.id}}" method="post" class="d-inline"
                              onsubmit="return confirm('Delete this product?')">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Product Modal -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="productForm" th:action="@{/admin/products/save}" method="post">
                    <div class="modal-header pp-modal-header">
                        <h5 class="modal-title" id="productModalTitle">Add Product</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="id" id="prodId"/>
                        <div class="mb-3">
                            <label class="form-label">Name *</label>
                            <input type="text" name="name" id="prodName" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category *</label>
                            <input type="text" name="category" id="prodCategory" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Price (₹) *</label>
                            <input type="number" name="price" id="prodPrice" class="form-control" step="0.01" min="0" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Image Filename *</label>
                            <input type="text" name="image" id="prodImage" class="form-control" required/>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn pp-btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
<script>
function openProductForm(btn) {
    if (btn && btn.dataset.id) {
        document.getElementById('productModalTitle').textContent = 'Edit Product';
        document.getElementById('prodId').value = btn.dataset.id;
        document.getElementById('prodName').value = btn.dataset.name;
        document.getElementById('prodCategory').value = btn.dataset.category;
        document.getElementById('prodPrice').value = btn.dataset.price;
        document.getElementById('prodImage').value = btn.dataset.image;
        new bootstrap.Modal(document.getElementById('productModal')).show();
    } else {
        document.getElementById('productModalTitle').textContent = 'Add Product';
        document.getElementById('productForm').reset();
        document.getElementById('prodId').value = '';
    }
}
</script>
</th:block>
</body>
</html>
