<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Manage Testimonials</title></head>
<body>
<div layout:fragment="content">
    <h4 class="pp-section-title mb-3"><i class="bi bi-chat-quote me-2"></i>Testimonial Management</h4>

    <div class="row g-3" th:if="${!testimonials.isEmpty()}">
        <div class="col-md-6 col-lg-4" th:each="t : ${testimonials}">
            <div class="card h-100" th:classappend="${t.status.name() == 'PENDING'} ? 'border-warning' :
                                                   (${t.status.name() == 'APPROVED'} ? 'border-success' : 'border-danger')">
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-2">
                        <strong th:text="${t.name}"></strong>
                        <span class="badge"
                              th:classappend="${t.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                             (${t.status.name() == 'APPROVED'} ? 'bg-success' : 'bg-danger')"
                              th:text="${t.status}"></span>
                    </div>
                    <p class="small text-muted mb-1" th:if="${t.petName != null}">Pet: <span th:text="${t.petName}"></span></p>
                    <p class="small mb-2" th:text="${t.text}"></p>
                    <div th:if="${t.rating != null}" class="mb-2">
                        <span th:each="i : ${#numbers.sequence(1, t.rating)}" class="text-warning">★</span>
                    </div>
                    <small class="text-muted" th:text="${t.submittedAt != null} ? 'Submitted: ' + ${#temporals.format(t.submittedAt, 'yyyy-MM-dd HH:mm')} : ''"></small>
                </div>
                <div class="card-footer bg-transparent">
                    <div class="d-flex gap-1">
                        <form th:action="@{/admin/testimonials/update-status}" method="post" class="d-inline"
                              th:if="${t.status.name() != 'APPROVED'}">
                            <input type="hidden" name="testimonialId" th:value="${t.id}"/>
                            <input type="hidden" name="newStatus" value="APPROVED"/>
                            <button class="btn btn-sm btn-outline-success"><i class="bi bi-check-lg me-1"></i>Approve</button>
                        </form>
                        <form th:action="@{/admin/testimonials/update-status}" method="post" class="d-inline"
                              th:if="${t.status.name() != 'REJECTED'}">
                            <input type="hidden" name="testimonialId" th:value="${t.id}"/>
                            <input type="hidden" name="newStatus" value="REJECTED"/>
                            <button class="btn btn-sm btn-outline-warning"><i class="bi bi-x-lg me-1"></i>Reject</button>
                        </form>
                        <form th:action="@{'/admin/testimonials/delete/' + ${t.id}}" method="post" class="d-inline"
                              onsubmit="return confirm('Delete this testimonial?')">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${testimonials.isEmpty()}" class="text-center text-muted py-4">No testimonials found.</div>
</div>
</body>
</html>
