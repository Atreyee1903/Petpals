<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Admin Dashboard</title></head>
<body>
<div layout:fragment="content">
    <h4 class="pp-section-title mb-4"><i class="bi bi-speedometer2 me-2"></i>Admin Dashboard</h4>
    <div class="row g-3">
        <div class="col-md-4 col-lg-2">
            <a th:href="@{/admin/pets}" class="text-decoration-none">
                <div class="card pp-card text-center p-3">
                    <i class="bi bi-heart-pulse display-5 pp-primary-text"></i>
                    <h3 class="mt-2 mb-0" th:text="${petCount}"></h3>
                    <small class="text-muted">Pets</small>
                </div>
            </a>
        </div>
        <div class="col-md-4 col-lg-2">
            <a th:href="@{/admin/products}" class="text-decoration-none">
                <div class="card pp-card text-center p-3">
                    <i class="bi bi-box-seam display-5 pp-primary-text"></i>
                    <h3 class="mt-2 mb-0" th:text="${productCount}"></h3>
                    <small class="text-muted">Products</small>
                </div>
            </a>
        </div>
        <div class="col-md-4 col-lg-2">
            <a th:href="@{/admin/orders}" class="text-decoration-none">
                <div class="card pp-card text-center p-3">
                    <i class="bi bi-receipt display-5 pp-primary-text"></i>
                    <h3 class="mt-2 mb-0" th:text="${orderCount}"></h3>
                    <small class="text-muted">Orders</small>
                </div>
            </a>
        </div>
        <div class="col-md-4 col-lg-3">
            <a th:href="@{/admin/testimonials}" class="text-decoration-none">
                <div class="card pp-card text-center p-3">
                    <i class="bi bi-chat-quote display-5 pp-accent-text"></i>
                    <h3 class="mt-2 mb-0" th:text="${pendingTestimonials}"></h3>
                    <small class="text-muted">Pending Testimonials</small>
                </div>
            </a>
        </div>
        <div class="col-md-4 col-lg-3">
            <a th:href="@{/admin/support}" class="text-decoration-none">
                <div class="card pp-card text-center p-3">
                    <i class="bi bi-headset display-5 pp-accent-text"></i>
                    <h3 class="mt-2 mb-0" th:text="${openQueries}"></h3>
                    <small class="text-muted">Open Support Queries</small>
                </div>
            </a>
        </div>
    </div>
</div>
</body>
</html>
